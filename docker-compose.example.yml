services:
    app:
        build: .
        ports:
            - "8080:8080"
        environment:
            - SPRING_DATASOURCE_URL=jdbc:postgresql://db.YOUR-REF.supabase.co:5432/postgres
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=YOUR-PASSWORD
            - SPRING_PROFILES_ACTIVE=prod
        restart: unless-stopped
